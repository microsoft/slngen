resources:
  repositories:
  - repository: MicroBuildTemplate
    type: git
    name: 1ESPipelineTemplates/MicroBuildTemplate
    ref: refs/tags/release
variables:
  LogDirectory: $(Build.ArtifactStagingDirectory)/logs
  ArtifactsDirectory: artifacts
  BuildConfiguration: 'Release'
  BuildPlatform: 'Any CPU'
  MSBuildArgs: '"/Property:Platform=$(BuildPlatform);Configuration=$(BuildConfiguration)" "/p:RestoreConfigFile=$(Build.SourcesDirectory)\NuGet.config" "/BinaryLogger:$(Build.SourcesDirectory)\$(ArtifactsDirectory)\msbuild.binlog"'
  SignType: 'Real'
  DotNetInstallDirectory: '$(Agent.TempDirectory)\dotnet'

trigger:
  batch: true
  branches:
    include:
    - 'main'
    - 'refs/tags/*'
  paths:
    exclude:
    - '*.md'
pr: none
extends:
  template: azure-pipelines/MicroBuild.1ES.Official.yml@MicroBuildTemplate
  parameters:
    settings:
      networkIsolationPolicy: Permissive,CFSClean
    sdl:
      sbom:
        enabled: false
    pool:
      name: VSEngSS-MicroBuild2022-1ES
      demands:
      - msbuild
      - visualstudio
      os: windows
    stages:
    - stage: ''
      displayName: 'Build'
      jobs:
      - job: Build
        displayName: 'Build'
        pool:
          name: 'VSEngSS-MicroBuild2022-1ES'
        templateContext:
          mb:
            signing:
              enabled: true
              signType: $(SignType)
              signWithProd: true
              zipSources: false
          outputs:
          - output: pipelineArtifact
            displayName: 'Publish Artifacts'
            condition: always()
            targetPath: $(ArtifactsDirectory)
            artifactName: 'artifacts'
        steps:
        - script: 'echo ##vso[task.setvariable variable=SignType;]Real'
          displayName: 'Set SignType to Real for tagged commits'
          condition: and(succeeded(), startsWith(variables['Build.SourceBranch'], 'refs/tags/v'))
        - task: UseDotNet@2
          displayName: 'Install .NET 8 SDK'
          inputs:
            packageType: 'sdk'
            version: '8.x'
            installationPath: '$(DotNetInstallDirectory)'
        - task: UseDotNet@2
          displayName: 'Install .NET 9 SDK'
          inputs:
            packageType: 'sdk'
            version: '9.x'
            installationPath: '$(DotNetInstallDirectory)'
        - task: UseDotNet@2
          displayName: 'Install .NET 10 SDK'
          inputs:
            packageType: 'sdk'
            version: '10.x'
            installationPath: '$(DotNetInstallDirectory)'
        - powershell: |
            dotnet --info
          displayName: 'Show .NET info'

        - task: NuGetAuthenticate@1
          displayName: 'Authenticate Azure Artifacts feeds'

        - task: VSBuild@1
          displayName: 'Build Solution'
          inputs:
            solution: '**\*.sln'
            vsVersion: '18.0'
            msbuildArgs: '$(MSBuildArgs)'
        - task: PublishSymbols@2
          displayName: 'Publish Symbols'
          inputs:
            SearchPattern: '**/bin/**/*.pdb'
            IndexSources: false
            SymbolServerType: TeamServices
